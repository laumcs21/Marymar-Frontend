<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f3b4d",
                        "accent": "#f97316",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121c20",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Mar y Mar - Carrito de Compras</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<main class="flex flex-1 justify-center py-8 px-4 md:px-10 lg:px-20">
<div class="layout-content-container flex flex-col max-w-[1200px] flex-1">
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<!-- Left Side: Product List -->
<div class="lg:col-span-2 flex flex-col gap-4">
<div
*ngFor="let item of items"
class="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm justify-between">

<div class="flex items-center gap-4">

<img
[src]="item.imagen"
class="rounded-lg size-20 object-cover"
/>

<div>

<p class="font-bold">
{{item.nombre}}
</p>

<p class="text-primary font-bold">
${{item.precio}}
</p>

</div>

</div>

<div class="flex items-center gap-3">

<button (click)="disminuir(item.productoId)">
-
</button>

<span>
{{item.cantidad}}
</span>

<button (click)="aumentar(item.productoId)">
+
</button>

<button
(click)="eliminar(item.productoId)"
class="text-red-500">
Eliminar
</button>

</div>

</div><!-- Empty Space/Continue Shopping -->
<div class="mt-4">
<button (click)="irMenu()"
class="text-primary dark:text-primary/80 flex items-center gap-2 font-bold text-sm">
<span class="material-symbols-outlined">arrow_back</span>
                                    Seguir Comprando
                                </button>
</div>
</div>
<!-- Right Side: Order Summary & Checkout -->
<div class="lg:col-span-1 flex flex-col gap-6">
<!-- Summary Card -->
<div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-primary/5">
<h3 class="text-primary dark:text-white text-xl font-bold mb-6">Resumen de Pedido</h3>
<div class="flex flex-col gap-3 border-b border-primary/10 pb-4 mb-4">
<div class="flex justify-between items-center text-slate-600 dark:text-slate-400">
<span>Subtotal</span>
<span class="font-medium">$42.50</span>
</div>
<div class="flex justify-between items-center text-slate-600 dark:text-slate-400">
<span>Envío</span>
<span class="font-medium text-green-600">Gratis</span>
</div>
<div class="flex justify-between items-center text-slate-600 dark:text-slate-400">
<span>Impuestos (8%)</span>
<span class="font-medium">$3.40</span>
</div>
</div>
<div class="flex justify-between items-center text-primary dark:text-white text-xl font-black mb-6">
<span>Total</span>
<span>$45.90</span>
</div>
<!-- Payment Section -->
<div class="mb-6">
<p class="text-primary dark:text-white font-bold text-sm mb-4">Método de Pago</p>
<div class="grid grid-cols-3 gap-2">
<button class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-primary bg-primary/5 text-primary">
<span class="material-symbols-outlined mb-1">payments</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Efectivo</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-transparent bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:border-primary/30 transition-all">
<span class="material-symbols-outlined mb-1">credit_card</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Tarjeta</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-transparent bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:border-primary/30 transition-all">
<span class="material-symbols-outlined mb-1">account_balance</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Transf.</span>
</button>
</div>
</div>
<!-- Checkout Button -->
<button class="w-full bg-accent hover:bg-accent/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2">
<span>Finalizar Pedido</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
<p class="text-center text-slate-400 dark:text-slate-500 text-[11px] mt-4 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">lock</span>
                                    Pago seguro procesado por Mar y Mar
                                </p>
</div>
<!-- Promo Code (Optional extra) -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-primary/5">
<div class="flex gap-2">
<input class="flex-1 bg-slate-50 dark:bg-slate-700 border-none rounded-lg text-sm px-4 focus:ring-primary" placeholder="Código de descuento" type="text"/>
<button class="bg-primary/10 text-primary dark:text-white px-4 py-2 rounded-lg font-bold text-sm">Aplicar</button>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="mt-auto border-t border-primary/10 bg-white dark:bg-background-dark py-8 px-10 text-center">
<p class="text-slate-500 text-sm">© 2024 Mar y Mar Mariscos. Todos los derechos reservados.</p>
</footer>
</div>
</div>
</body></html>
