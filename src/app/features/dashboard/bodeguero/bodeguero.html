<div class="flex h-screen overflow-hidden bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">

  <!-- SideNavBar -->
  <aside class="w-64 bg-white dark:bg-slate-900 border-r border-primary/10 flex flex-col justify-between">
    <div class="flex flex-col gap-8 p-6">
      <div class="flex items-center gap-3">
        <div class="bg-primary rounded-lg p-2 text-white">
          <span class="material-symbols-outlined">restaurant</span>
        </div>
        <div class="flex flex-col">
          <h1 class="text-primary text-lg font-bold leading-none">Mar y Mar</h1>
          <p class="text-slate-500 dark:text-slate-400 text-xs font-medium">Panel de Bodeguero</p>
        </div>

        <!-- 🔔 CAMPANA (SIDEBAR) -->
        <div class="flex items-center gap-4 relative">
          <button
            (click)="toggleNotificaciones()"
            class="p-2 rounded-full bg-white dark:bg-slate-800 border border-primary/10 text-primary relative">

            <span class="material-symbols-outlined">notifications</span>

            <span
              *ngIf="hayNotificaciones"
              class="absolute top-2 right-2 size-2 bg-accent-orange rounded-full border-2 border-white">
            </span>
          </button>
        </div>
      </div>

      <nav class="flex flex-col gap-2">
        <a
          (click)="irInventario()"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-primary/5 transition-colors cursor-pointer">
          <span class="material-symbols-outlined">contract</span>
          <span class="text-sm font-medium">Inventario</span>
        </a>

        <a
          (click)="irPerfil()"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-primary/5 transition-colors cursor-pointer">
          <span class="material-symbols-outlined">person</span>
          <span class="text-sm font-medium">Mi Perfil</span>
        </a>
      </nav>
    </div>

    <div class="p-6 border-t border-primary/5">
      <div class="flex items-center gap-3">
        <div class="size-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">
          M
        </div>
        <div class="flex flex-col">
          <p class="text-sm font-semibold">
            {{ nombreBodeguero }}
          </p>
          <p class="text-xs text-slate-500">Turno activo</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col overflow-y-auto">

    <!-- Header -->
    <header class="flex items-center justify-between px-8 py-4 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10 border-b border-primary/5">

      <h2 class="text-2xl font-bold text-primary dark:text-slate-100">Panel del Bodeguero</h2>

      <div class="flex items-center gap-4 relative z-50">

              <button
        (click)="toggleNotificaciones()"
        class="p-2 rounded-full bg-white dark:bg-slate-800 border border-primary/10 text-primary relative">

        <span class="material-symbols-outlined">notifications</span>

        <span
          *ngIf="hayNotificaciones"
          class="absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white z-50">
        </span>

      </button>

        <button class="p-2 rounded-full bg-white dark:bg-slate-800 border border-primary/10 text-primary">
          <span class="material-symbols-outlined">settings</span>
        </button>

        <div class="h-8 w-px bg-primary/10"></div>

        <button
          (click)="logout()"
          class="flex items-center gap-2 bg-orange-500 text-white px-5 py-2 rounded-lg font-semibold hover:bg-orange-600 transition">
          <span class="material-symbols-outlined text-[20px]">logout</span>
          Cerrar sesión
        </button>

        <!-- 🔔 PANEL NOTIFICACIONES -->
        <div
          *ngIf="mostrarPanelNotificaciones"
          class="notificaciones-panel"
          (click)="$event.stopPropagation()">

          <div class="header-notificaciones">
            <h3>Notificaciones</h3>
            <button class="btn-cerrar" (click)="cerrarNotificaciones()">✕</button>
          </div>

          <div
            *ngFor="let n of notificaciones"
            class="mb-3 p-3 rounded-lg border"
            [ngClass]="{
              'border-red-300 bg-red-50': n.tipo === 'BODEGA_BAJA',
              'border-orange-300 bg-orange-50': n.tipo === 'COCINA_BAJA',
              'border-yellow-300 bg-yellow-50': n.tipo === 'POR_VENCER'
            }">

            <div class="font-semibold mb-1">
              {{ n.tipo }}
            </div>

            <div class="text-sm whitespace-pre-line">
              {{ n.mensaje }}
            </div>

          </div>
        </div>

      </div>
    </header>

    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<div
  *ngIf="mostrarPanelNotificaciones"
  class="overlay"
  (click)="cerrarNotificaciones()">
</div>
